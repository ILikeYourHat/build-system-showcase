name: "Mill"
on:
  push:
    branches:
      - '**'
jobs:
  build-mill:
    name: "Build Mill"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./mill
    steps:
      - name: Checkout project
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin

      - name: Build project
        run: ./mill compile

      - name: Verify program
        run: |
          OUTPUT=$(./mill run)
          echo "$OUTPUT"
          
          if echo "$OUTPUT" | grep -q "Here goes the joke:"; then
            exit 0
          else
            exit 1
          fi

      - name: Test project
        run: ./mill test
