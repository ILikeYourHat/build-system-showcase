name: "Build"
on:
  push:
    branches:
      - '**'
jobs:
  build-gradle:
    name: "Build Gradle"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v6
        with:
          sparse-checkout: 'gradle'

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build project
        run: ./gradlew assemble

      - name: Verify output
        run: ../scripts/test_program.sh build/libs/joke-app.jar

      - name: Test project
        run: ./gradlew test
