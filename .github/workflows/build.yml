name: "Build"
on:
  push:
    branches:
      - '**'
jobs:
  build-all:
    name: "Build ${{ matrix.tool }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - tool: "mill"
            compileScript: "./mill compile"
            runScript: "./mill run"
            testScript: "./mill test"
    defaults:
      run:
        working-directory: ./${{ matrix.tool }}
    steps:
      - name: Checkout project
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin

      - name: Setup Ant
        if: ${{ matrix.tool == 'ant' }}
        uses: cedx/SetupAnt@v6
        with:
          version: =1.10.17

      - name: Setup Bazel
        if: ${{ matrix.tool == 'bazel' }}
        uses: bazel-contrib/setup-bazel@0.19.0

      - name: Setup Gradle
        if: ${{ matrix.tool == 'gradle' }}
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic

      - name: Setup sbt
        if: ${{ matrix.tool == 'sbt' }}
        uses: sbt/setup-sbt@v1

      - name: Verify program
        run: |
          ./mill run

      - name: Test project
        run: ${{ matrix.testScript }}
