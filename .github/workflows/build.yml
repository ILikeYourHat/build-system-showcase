name: "Build"
on:
  push:
    branches:
      - '**'
jobs:
  build-all:
    name: "Build ${{ matrix.tool }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - tool: "ant"
            compileScript: "ant compile"
            runScript: "ant run"
            testScript: "ant test"
          - tool: "bazel"
            compileScript: "bazel build //..."
            runScript: "bazel run :JokeApp"
            testScript: "bazel test //..."
          - tool: "bld"
            compileScript: "./bld compile"
            runScript: "./bld run"
            testScript: "./bld test"
          - tool: "gradle"
            compileScript: "./gradlew assemble"
            runScript: "./gradlew run"
            testScript: "./gradlew test"
          - tool: "kotlin-toolchain"
            compileScript: "./kotlin build"
            runScript: "./kotlin run"
            testScript: "./kotlin test"
          - tool: "maven"
            compileScript: "./mvnw compile"
            runScript: "./mvnw compile exec:java"
            testScript: "./mvnw test"
          - tool: "mill"
            compileScript: "./mill compile"
            runScript: "./mill run"
            testScript: "./mill test"
          - tool: "sbt"
            compileScript: "sbt compile"
            runScript: "sbt run"
            testScript: "sbt test"
    defaults:
      run:
        working-directory: ./${{ matrix.tool }}
    steps:
      - name: Checkout project
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin

      - name: Setup Ant
        if: ${{ matrix.tool == 'ant' }}
        uses: cedx/SetupAnt@v6
        with:
          version: =1.10.17

      - name: Setup Bazel
        if: ${{ matrix.tool == 'bazel' }}
        uses: bazel-contrib/setup-bazel@0.19.0

      - name: Setup Gradle
        if: ${{ matrix.tool == 'gradle' }}
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic

      - name: Setup sbt
        if: ${{ matrix.tool == 'sbt' }}
        uses: sbt/setup-sbt@v1

      - name: Compile project
        run: ${{ matrix.compileScript }}

      - name: Verify program
        run: |
          OUTPUT=$(${{ matrix.runScript }})
          echo "$OUTPUT"
          
          if echo "$OUTPUT" | grep -q "Here goes the joke:"; then
            exit 0
          else
            exit 1
          fi

      - name: Test project
        run: ${{ matrix.testScript }}
