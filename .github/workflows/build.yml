name: "Build"
on:
  push:
    branches:
      - '**'
jobs:
  build-gradle:
    name: "Build Gradle"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./gradle
    steps:
      - name: Checkout project
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          build-scan-publish: false

      - name: Build project
        run: ./gradlew assemble

      - name: Verify program
        run: |
          set -euo pipefail
          OUTPUT=$(./gradlew run)
          echo "$OUTPUT"
  
          if echo "$OUTPUT" | grep -q "Here goes thee joke:"; then
            echo "Assertion passed, program compiled correctly"
            exit 0
          else
            echo "Assertion failed"
            exit 1
          fi

      - name: Test project
        run: ./gradlew test
